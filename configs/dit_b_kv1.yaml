# DiT-B/2 with Attention Scaffolding (1 KV layer) — for quick ablation
# Usage: ./launch.sh --config configs/dit_b_kv1.yaml --exp-name dit_b_kv1 --gpu 0,1 --num-gpus 2

model: DiT-B/2
image-size: 256
num-classes: 1000

epochs: 1400
global-batch-size: 256
ckpt-every: 50000
log-every: 100

use-kv: true
enc-type: vit_large_patch14_dinov2.lvd142m
enc-resolution: 224
num-kv-layers: 1
kv-proj-type: linear
kv-norm-type: layer

stage1-steps: 100000
distill-coeff: 1.0

proj-coeff: 0.5
encoder-depth: 6
repa-loss: cosine
