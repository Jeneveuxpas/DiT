# DiT-XL/2 with Attention Scaffolding (1 KV layer)
# Usage: ./launch.sh --config configs/dit_xl_kv1.yaml --exp-name dit_xl_kv1 --gpu 0,1,2,3 --num-gpus 4

# Model
model: DiT-XL/2
image-size: 256
num-classes: 1000

# Training
epochs: 1400
global-batch-size: 256
ckpt-every: 50000
log-every: 100

# Encoder KV
use-kv: true
enc-type: vit_large_patch14_dinov2.lvd142m
enc-resolution: 224
num-kv-layers: 1
# enc-layer-indices: "23"   # optional: specify exact encoder layer
kv-proj-type: linear
kv-norm-type: layer

# Two-stage
stage1-steps: 100000
distill-coeff: 1.0

# REPA
proj-coeff: 0.5
encoder-depth: 8
repa-loss: cosine
